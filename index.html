<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="hud">
    <span>SCORE: <b id="score">0</b></span>
    <span>LEVEL: <b id="level">1</b></span>
    <span>LIVES: <b id="lives">3</b></span>
    <span>BEST: <b id="best">0</b></span>
  </div>
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <h1>BREAKOUT</h1>
    <p id="msg">Press SPACE or tap to start</p>
  </div>
  <script src="src/constants.js"></script>
  <script src="src/ball.js"></script>
  <script src="src/paddle.js"></script>
  <script src="src/brick.js"></script>
  <script src="src/powerup.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
